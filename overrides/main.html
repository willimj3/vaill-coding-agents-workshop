{% extends "base.html" %}

{% block announce %}{% endblock %}

  <style>
    .feedback-line {
      margin-top: 2.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--md-default-fg-color--lightest);
      font-size: 0.8rem;
      opacity: 0.6;
    }
    .feedback-line:hover { opacity: 0.85; }
  </style>

{% block content %}
  {{ super() }}
  <p class="feedback-line">
    Questions or feedback?
    <a href="https://github.com/willimj3/vaill-coding-agents-workshop/issues" target="_blank">Open an issue on GitHub</a>
    or contact the <a href="https://law.vanderbilt.edu/vanderbilt-ai-law-lab/">Vanderbilt AI Law Lab</a>.
  </p>
{% endblock %}

{% block scripts %}
  {{ super() }}

  <script>
    /* Make the site title text clickable — navigates home like the logo icon */
    (function() {
      var title = document.querySelector('.md-header__title');
      if (title) {
        title.style.cursor = 'pointer';
        title.addEventListener('click', function() {
          var logo = document.querySelector('.md-header__button.md-logo');
          if (logo) logo.click();
        });
      }
    })();
  </script>
{% endblock %}
