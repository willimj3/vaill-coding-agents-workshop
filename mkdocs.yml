site_name: Claude Blattman · AI for Professionals Who Don't Code
site_url: https://claudeblattman.com
site_description: A project manager's guide to building AI workflows — from chatbots to self-improving systems
site_author: Chris Blattman
repo_url: https://github.com/chrisblattman/claudeblattman
repo_name: chrisblattman/claudeblattman

edit_uri: ""

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: DM Sans
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.sections
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Essentials:
    - essentials/index.md
    - Chatbots Done Right: essentials/chatbots.md
    - The Cost Reality: essentials/cost.md
    - Prompt Engineering: essentials/prompting.md
    - "Teaching AI Your Voice": essentials/voice.md
    - AI Project Folders: essentials/project-folders.md
    - "Stress-Test Any Plan": workflows/plan-review-browser.md
    - Voice Dictation: essentials/wispr-flow.md
    - Meeting Transcription: essentials/granola.md
    - NotebookLM: essentials/notebooklm.md
    - "ChatGPT vs Claude": essentials/chatgpt-vs-claude.md
  - Setup:
    - setup/index.md
    - Install (Mac): toolkit/install-mac.md
    - Install (Windows): toolkit/install-windows.md
    - Set Up VS Code: setup/vscode-setup.md
    - Your CLAUDE.md: toolkit/claude-md.md
    - MCP Setup: toolkit/mcp-setup.md
    - Skill Library: setup/skill-reference.md
  - Workflows:
    - workflows/index.md
    - "Prompt, Plan, Review, Revise": workflows/first-session-skills.md
    - Executive Assistant:
      - toolkit/executive-assistant.md
      - "Example: Noise Canceling": workflows/school-digest.md
    - Project Management: workflows/project-management.md
    - "Example: Project Dashboard": workflows/examples/project-overview-example.md
    - "Example: Research Design": workflows/examples/research-design-example.md
    - "Tax Season":
      - tax-workflow/index.md
      - Privacy & Setup: tax-workflow/before-you-start/privacy-and-setup.md
      - Workflow Overview: tax-workflow/case-study/the-workflow-overview.md
      - Document Collection: tax-workflow/case-study/document-collection.md
      - Compilation & Review: tax-workflow/case-study/compilation-and-review.md
      - What AI Got Wrong: tax-workflow/case-study/what-ai-got-wrong.md
      - Architecture Patterns: tax-workflow/build-your-own/architecture-patterns.md
      - Starter Templates: tax-workflow/build-your-own/starter-templates.md
      - Academic Tax Basics: tax-workflow/reference/academic-tax-basics.md
      - When to Get Help: tax-workflow/reference/when-to-get-help.md
  - Build Your Own:
    - system/index.md
    - Building Skills: system/building-skills.md
    - Agents vs Skills: system/agents-vs-skills.md
    - Continuous Improvement: system/continuous-improvement.md
    - Patterns: system/patterns.md
    - "A Real CLAUDE.md": downloads/real-claude-md-example.md
  - About:
    - about.md
    - Resources: resources.md
    - Privacy: privacy.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - tables
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - meta
  - redirects:
      redirect_maps:
        quickstart.md: essentials/index.md
        essentials/folders/vacation.md: essentials/project-folders.md
        essentials/folders/shopping.md: essentials/project-folders.md
        essentials/folders/health.md: essentials/project-folders.md
        setup/modes.md: setup/index.md
        toolkit/skills-guide.md: setup/skill-reference.md
  - social:
      cards_layout_options:
        background_color: "#263238"
        color: "#80cbc4"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chrisblattman/claudeblattman
    - icon: fontawesome/brands/x-twitter
      link: https://twitter.com/cblatts

copyright: >
  Built by <a href="https://chrisblattman.com">Chris Blattman</a> &mdash;
  shared freely under MIT License
