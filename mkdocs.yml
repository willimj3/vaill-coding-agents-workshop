site_name: VAILL Faculty Guide to AI Agents
site_url: https://willimj3.github.io/vaill-coding-agents-workshop/
site_description: A faculty guide to AI tools for legal professionals — from chatbot prompting to coding agents with Claude Code. By the Vanderbilt AI Law Lab.
site_author: Vanderbilt AI Law Lab
repo_url: https://github.com/willimj3/vaill-coding-agents-workshop
repo_name: vaill-coding-agents-workshop

edit_uri: ""

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  custom_dir: overrides
  logo: images/vaill_logo.png
  favicon: images/vaill_logo.png
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.sections
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - AI Essentials:
    - essentials/index.md
    - Chatbots Done Right: essentials/chatbots.md
    - Prompt Engineering: essentials/prompting.md
    - "Teaching AI Your Voice": essentials/voice.md
    - AI Project Folders: essentials/project-folders.md
    - "Stress-Test Any Plan": workflows/plan-review-browser.md
    - "ChatGPT vs Claude": essentials/chatgpt-vs-claude.md
    - The Cost Reality: essentials/cost.md
  - What Are Coding Agents?:
    - agents/index.md
    - The Agent Landscape: agents/landscape.md
    - Why Claude Code?: agents/why-claude-code.md
    - What Agents Can Do: agents/capabilities.md
    - Limitations & Risks: agents/limitations.md
  - Setup:
    - setup/index.md
    - Install (Mac): toolkit/install-mac.md
    - Install (Windows): toolkit/install-windows.md
    - Set Up VS Code: setup/vscode-setup.md
    - "Your CLAUDE.md": toolkit/claude-md.md
    - MCP Connections: toolkit/mcp-setup.md
  - For Legal Practice:
    - legal-practice/index.md
    - Contract Review: legal-practice/contract-review.md
    - Brief Drafting: legal-practice/brief-drafting.md
    - Legal Research: legal-practice/legal-research.md
    - Client Communication: legal-practice/client-communication.md
    - Document Analysis: legal-practice/document-analysis.md
  - For Legal Academia:
    - legal-academia/index.md
    - Literature Reviews: legal-academia/literature-reviews.md
    - Empirical Legal Research: legal-academia/empirical-research.md
    - Syllabus & Course Design: legal-academia/syllabus-design.md
    - Exam Drafting & Rubrics: legal-academia/exam-drafting.md
    - Grant Writing: legal-academia/grant-writing.md
    - Student Feedback: legal-academia/student-feedback.md
  - Build Your Own:
    - system/index.md
    - Your First Workflow: workflows/first-session-skills.md
    - "Skills & Agents Explained": system/agents-vs-skills.md
    - Patterns & Templates: system/patterns.md
  - About:
    - about.md
    - Resources: resources.md
    - Privacy: privacy.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - tables
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - meta
  - redirects:
      redirect_maps:
        quickstart.md: essentials/index.md
        essentials/folders/vacation.md: essentials/project-folders.md
        essentials/folders/shopping.md: essentials/project-folders.md
        essentials/folders/health.md: essentials/project-folders.md
        setup/modes.md: setup/index.md
        toolkit/skills-guide.md: setup/index.md
        setup/skill-reference.md: setup/index.md
  - social:
      cards_layout_options:
        background_color: "#1C1C1C"
        color: "#ffffff"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/willimj3/vaill-coding-agents-workshop
    - icon: fontawesome/solid/globe
      link: https://law.vanderbilt.edu/ai-law-lab/

copyright: >
  Built by <a href="https://law.vanderbilt.edu/ai-law-lab/">Vanderbilt AI Law Lab</a> &mdash;
  shared freely under MIT License
